  build-web:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'
        channel: 'stable'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Build Web
      run: flutter build web --release --web-renderer html
      
    - name: Upload Web artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: build/web/

  create-release:
    needs: [build-android, build-web]  # ⭐ XÓA build-ios
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        name: Smart Home App v${{ github.run_number }}
        body: |
          🏠 **Smart Home ESP32-CAM App**
          
          **Features:**
          - 📱 Face Recognition with ESP32-CAM
          - 🔐 Bluetooth WiFi Provisioning  
          - 📡 MQTT Real-time Communication
          - 🎯 Smart Door Control
          - 📊 Activity Monitoring
          
          **Downloads:**
          - **Android APK**: For sideloading with Sideloadly
          - **Web**: Progressive Web App
          
          **Installation:**
          1. Download APK for Android
          2. Use Sideloadly to install on device
          3. Grant camera and location permissions
          
          Built on: ${{ github.sha }}
        draft: false
        prerelease: false
        files: |
          android-apk/app-arm64-v8a-release.apk