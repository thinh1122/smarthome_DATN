name: Build Flutter App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ⭐ CHỈ BUILD iOS - Tắt Android và Web để tiết kiệm tài nguyên
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Build iOS (no signing)
      run: flutter build ios --release --no-codesign
      
    - name: Create IPA
      run: |
        mkdir -p build/ios/ipa
        cd build/ios/iphoneos
        mkdir Payload
        cp -r Runner.app Payload/
        zip -r ../ipa/SmartHome.ipa Payload/
        
    - name: Upload IPA artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: build/ios/ipa/*.ipa

  create-release:
    needs: [build-ios]  # ⭐ CHỈ CẦN iOS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        name: Smart Home App v${{ github.run_number }}
        body: |
          🏠 **Smart Home ESP32-CAM App - iOS Only Build**
          
          **Features:**
          - 📱 Face Recognition with ESP32-CAM
          - 🔐 Bluetooth WiFi Provisioning  
          - 📡 MQTT Real-time Communication
          - 🎯 Smart Door Control
          - 📊 Activity Monitoring
          
          **Downloads:**
          - **iOS IPA**: For sideloading (requires developer account)
          
          **Installation:**
          1. Download IPA for iOS
          2. Use Sideloadly to install on device
          3. Grant camera and location permissions
          
          Built on: ${{ github.sha }}
        draft: false
        prerelease: false
        files: |
          ios-ipa/SmartHome.ipa